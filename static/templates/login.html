<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #313338;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #2b2d31;
            padding: 30px;
            border-radius: 16px;
            width: 340px;
        }

        h1 {
            margin-top: 0;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            background: #1e1f22;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #5865f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #6c78ff;
        }

        .error {
            color: #ff7b7b;
            margin-bottom: 10px;
        }

        a {
            color: #8ea1e1;
            text-decoration: none;
        }

        .small {
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Login</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="small">If login fails, create a new account 👇</div>
        <div class="small">Don't have an account? <a href="/register">Sign up</a></div>
    </div>

</body>
</html>
